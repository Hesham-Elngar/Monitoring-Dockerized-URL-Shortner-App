name: Full CI-CD Pipeline

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to run CI/CD on'
        required: true
        default: 'dev/test'
  push:
    branches:
      - dev/test
      - staging
      - prod
  pull_request:
    branches:
      - main
      - prod

jobs:

  #####################################
  #      🔍 CI — TEST + LINT          #
  #####################################
  ci-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run backend tests
        working-directory: backend
        run: pytest

      - name: Run flake8 lint
        working-directory: backend
        run: |
          pip install flake8
          flake8 .

      - name: Print current branch
        run: echo "Current branch: ${{ github.event.inputs.branch || github.ref }}"


  #####################################
  #   🚀 Deploy (branch-based)        #
  #####################################
  deploy:
    runs-on: ubuntu-latest
    needs: ci-checks
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Deploy based on branch
        run: |
          DEPLOY_BRANCH="${{ github.event.inputs.branch || github.ref }}"

          echo "Deploying branch: $DEPLOY_BRANCH"

          if [[ "$DEPLOY_BRANCH" == "refs/heads/dev/test" || "$DEPLOY_BRANCH" == "dev/test" ]]; then
            echo "✅ Dev/Test deploy: Validate docker-compose"
            docker compose -f docker-compose.yml config

          elif [[ "$DEPLOY_BRANCH" == "refs/heads/staging" || "$DEPLOY_BRANCH" == "staging" ]]; then
            echo "✅ Staging deploy: Minikube + Kubernetes manifests"

            # Install kubectl
            curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
            chmod +x kubectl
            sudo mv kubectl /usr/local/bin/

            # Install Minikube
            curl -LO https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64
            chmod +x minikube-linux-amd64
            sudo mv minikube-linux-amd64 /usr/local/bin/minikube

            # Start Minikube
            sudo minikube start --driver=docker --kubernetes-version=v1.28.0
            kubectl cluster-info

            # Create namespace
            kubectl create namespace url-shortener --dry-run=client -o yaml | kubectl apply -f -

            # Create secrets
            kubectl create secret generic app-secrets \
              --from-literal=FLASK_SECRET_KEY=${{ secrets.FLASK_SECRET_KEY }} \
              --from-literal=SLACK_WEBHOOK_URL=${{ secrets.SLACK_WEBHOOK_URL }} \
              --namespace url-shortener \
              --dry-run=client -o yaml | kubectl apply -f -

            # Apply manifests
            kubectl apply -f k8s/manifests/

          elif [[ "$DEPLOY_BRANCH" == "refs/heads/prod" || "$DEPLOY_BRANCH" == "prod" ]]; then
            echo "✅ Production deploy: ArgoCD GitOps"

            argocd login ${{ secrets.ARGOCD_SERVER }} \
              --username ${{ secrets.ARGOCD_USERNAME }} \
              --password ${{ secrets.ARGOCD_PASSWORD }} \
              --insecure

            argocd app sync url-shortener
            argocd app wait url-shortener

          else
            echo "⚠️ Branch not configured for deploy. Skipping."
